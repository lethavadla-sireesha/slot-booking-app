<!DOCTYPE html>
<html>
<head>
<title>Slot Booking System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Slot Booking Web Application</h1>

<table>
<tr>
<th>Slot Time</th>
<th>Status</th>
<th>Action</th>
</tr>

<tr>
<td>10:00 AM</td>
<td id="s1">Available</td>
<td><button onclick="bookSlot('s1')">Book</button></td>
</tr>

<tr>
<td>11:00 AM</td>
<td id="s2">Available</td>
<td><button onclick="bookSlot('s2')">Book</button></td>
</tr>

<tr>
<td>12:00 PM</td>
<td id="s3">Available</td>
<td><button onclick="bookSlot('s3')">Book</button></td>
</tr>

</table>

<script src="script.js"></script>

</body>
</html>
